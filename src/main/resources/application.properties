spring.application.name=servilink
server.port=${SERVER_PORT:8081}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5438}/${DB_NAME:servilink-db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=servilink-jwt-secret-key-dbp-2026-utec-change-in-prod
jwt.expiration=86400000

logging.level.com.example.demosass=DEBUG
logging.level.org.springframework.security=WARN

geo.nominatim.base-url=https://nominatim.openstreetmap.org
geo.nominatim.rate-limit-ms=1000
