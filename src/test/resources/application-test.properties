spring.datasource.url=jdbc:h2:mem:servilinktest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.docker.compose.enabled=false

logging.level.com.example.demosass=WARN
logging.level.org.springframework.security=WARN
logging.level.org.testcontainers=OFF
logging.level.com.github.dockerjava=OFF
